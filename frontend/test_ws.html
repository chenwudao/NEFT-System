<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Not connected</div>
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <div id="messages"></div>

    <script>
        let ws = null;
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');

        function log(message) {
            const p = document.createElement('p');
            p.textContent = new Date().toLocaleTimeString() + ': ' + message;
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            if (ws) {
                log('WebSocket already exists');
                return;
            }

            const wsUrl = 'ws://localhost:8000/ws';
            log('Connecting to: ' + wsUrl);
            
            try {
                ws = new WebSocket(wsUrl);
                log('WebSocket object created, readyState: ' + ws.readyState);

                ws.onopen = function() {
                    log('WebSocket connected, readyState: ' + ws.readyState);
                    statusDiv.textContent = 'Connected';
                    
                    // Send test message
                    ws.send(JSON.stringify({ type: 'ping' }));
                    log('Sent ping message');
                };

                ws.onmessage = function(event) {
                    log('Received: ' + event.data);
                };

                ws.onerror = function(error) {
                    log('Error: ' + error);
                    statusDiv.textContent = 'Error';
                };

                ws.onclose = function(event) {
                    log('Closed: ' + event.code + ' ' + event.reason);
                    statusDiv.textContent = 'Disconnected';
                    ws = null;
                };
            } catch (e) {
                log('Error creating WebSocket: ' + e);
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
    </script>
</body>
</html>
