<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆调度算法仿真可视化</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif !important;
        }
        
        /* 地图容器样式 */
        #mapContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 地图覆盖物样式 */
        .amap-marker-label {
            border: 1px solid #333;
            border-radius: 4px;
            background: white;
            padding: 2px 6px;
            font-size: 12px;
        }
        
        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            display: none;
        }
    </style>
    <!-- 引入高德地图API -->
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'b1244e9d37698591aec5f4184149a33e', // 在这里填入你的安全密钥
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=aaeb6c55c1207366c4137fb037def927"></script>
    <!-- 引入AMapUI组件库 -->
    <script type="text/javascript" src="https://webapi.amap.com/ui/1.1/main.js"></script>
    <!-- 引入 Chart.js（历史数据图表）-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>车辆调度算法仿真可视化</h1>
            <div class="controls">
                <button id="startButton">启动模拟</button>
                <button id="stopButton" disabled>暂停模拟</button>
                <button id="resetButton" style="background-color: #ff9800; color: white;">重置仿真</button>
                <label for="modeSelect">模式</label>
                <select id="modeSelect">
                    <option value="realtime" selected>实时策略</option>
                    <option value="static">静态规划</option>
                </select>
                <label for="scaleSelect">规模</label>
                <select id="scaleSelect">
                    <option value="small">小规模</option>
                    <option value="medium" selected>中规模</option>
                    <option value="large">大规模</option>
                </select>
                <button id="toggleMap">切换地图模式</button>
            </div>
        </header>
        <main>
            <div class="map-container">
                <!-- 加载提示 -->
                <div id="loadingOverlay" class="loading-overlay">正在加载地图...</div>
                <!-- 真实地图容器 -->
                <div id="mapContainer"></div>
                <!-- Canvas容器（作为备用或叠加层） -->
                <canvas id="simulationCanvas" style="display: none;"></canvas>
            </div>
            <div class="dashboard">
                <div class="core-stats">
                    <h2>仿真核心数据</h2>
                    <p>仿真状态：<span id="simulationStatus">未启动</span></p>
                    <p>仿真速度：<span id="simSpeedDisplay">×120（1秒=2分钟）</span></p>
                    <p>当前时间戳：<span id="timestamp">0</span></p>
                    <p>累计总得分：<span id="totalScore">0.0</span></p>
                    <p>任务完成率：<span id="taskCompletionRate">0.0%</span></p>
                    <p>车辆利用率：<span id="vehicleUtilization">0.0%</span></p>
                </div>
                <div class="strategy-reasoning">
                    <h3>当前调度策略</h3>
                    <p>策略：<span id="currentStrategy">-</span></p>
                    <p>选择原因：<span id="strategyReason">暂未选择</span></p>
                    <div id="strategyScoreDetail" class="strategy-score-wrap"></div>
                </div>
                <div class="vehicle-stats">
                    <h3>车辆状态</h3>
                    <div id="vehicleStatusList"></div>
                </div>
                <div class="task-stats">
                    <h3>任务状态</h3>
                    <div id="taskList"></div>
                </div>
                <div class="station-stats">
                    <h3>充电站状态</h3>
                    <div id="stationList"></div>
                </div>
                <!-- 历史数据图表面板（折叠式）-->
                <div class="charts-panel" id="chartsPanel">
                    <div class="charts-panel-header" id="chartsPanelToggle">
                        <h3>📊 历史数据趋势</h3>
                        <span class="toggle-icon" id="chartToggleIcon">▼</span>
                    </div>
                    <div class="charts-content" id="chartsContent">
                        <div class="chart-wrapper">
                            <canvas id="completionRateChart"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="utilizationChart"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="totalScoreChart"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="strategyTimelineChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer style="text-align: center; padding: 10px; background: #4CAF50; color: white;">
            车辆调度算法大作业 - 仿真可视化前端
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
